name: Validate Skills & Sources

on:
  pull_request:
    paths:
      - "skills/**"
      - "registry/**"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "registry/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate skills and sources
        run: python scripts/validate.py
