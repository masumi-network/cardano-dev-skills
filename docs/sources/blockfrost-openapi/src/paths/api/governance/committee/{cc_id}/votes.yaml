get:
  tags:
    - Cardano » Governance
  summary: Constitutional committee member votes
  description: >-
    Votes cast under a given constitutional committee credential. Accepts both
    the CIP-129 hot bech32 (`cc_hot1...`) and the cold bech32 (`cc_cold1...`).

    When queried by a cold credential, this returns votes cast by any hot key
    that the cold key has authorized over time (so the result aggregates across
    hot-key rotations).
  parameters:
    - in: path
      name: cc_id
      required: true
      schema:
        type: string
      description: CIP-129 bech32 committee credential (`cc_hot1...` or `cc_cold1...`).
      example: "cc_hot1qf4xq9mlra5j68w8zjz2lvf3kc3rtsdtu98ka7zx4u6jvqyy39ww0"
    - in: query
      name: count
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 100
      description: The number of results displayed on one page.
    - in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 21474836
        default: 1
      description: The page number for listing the results.
    - in: query
      name: order
      required: false
      schema:
        type: string
        enum: [asc, desc]
        default: asc
      description: |
        The ordering of items from the point of view of the blockchain,
        not the page listing itself. By default, we return oldest first, newest last.
  responses:
    "200":
      description: Return votes for the given committee credential
      content:
        application/json:
          schema:
            $ref: ../../../../../schemas/governance/committee_votes.yaml
    "400":
      $ref: ../../../../../responses/errors/400.yaml
    "403":
      $ref: ../../../../../responses/errors/403.yaml
    "429":
      $ref: ../../../../../responses/errors/429.yaml
    "418":
      $ref: ../../../../../responses/errors/418.yaml
    "500":
      $ref: ../../../../../responses/errors/500.yaml
