# Cardano Documentation Source Registry
#
# This is the canonical list of Cardano projects and their documentation.
# Community contributions welcome — see docs/CONTRIBUTING.md for the full policy.
#
# =============================================================================
# WHAT BELONGS HERE (read before adding an entry)
# =============================================================================
#
# IN SCOPE: SDKs, frameworks, validator libraries, design patterns, language
#           tooling, infrastructure, protocol/standard specs, reference
#           implementations of patterns.
#
# OUT OF SCOPE: product docs for specific deployed dApps (SundaeSwap, Minswap,
#               Liqwid, Indigo, JPG Store, etc.). Borderline rule — if the
#               repo's primary purpose is "use OUR product", it's out. If it's
#               "here's how X pattern works, here's the reference code", it's in.
#
# SOURCE-VETTING BAR (all must hold):
#   1. Last commit < 6 months old
#   2. >=1 release tag OR active issue/PR activity in the last 3 months
#   3. No archived / deprecated / sunset banner
#   4. For forks: pick the maintained canonical (e.g. Evolution SDK, not the
#      dead Lucid Evolution).
#
# Schema:
#   name: Human-readable project name
#   repo: GitHub clone URL
#   docs_path: Path within repo containing documentation
#   format: Primary format (markdown, mdx, rst, openapi, aiken, python, toml)
#   format_overrides: Per-glob format overrides (optional)
#   category: infrastructure | smart-contracts | sdk | standards | governance | scaling | testing | oracles
#   priority: high | medium | low
#   branch: Git branch to clone (optional, defaults to default branch)
#   glob_patterns: File patterns to include (optional, defaults to all matching format)
#   description: Short description of the project (optional)
#   website: Project website URL (optional)

# =============================================================================
# INDEXED SOURCES
# =============================================================================

